site_name: YaSolR
site_url: https://yasolr.carbou.me/
site_description: Heat water with your Solar Production Excess!
repo_url: https://github.com/mathieucarbou/YaSolR
repo_name: mathieucarbou/YaSolR
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2024-2026 Mathieu Carbou

exclude_docs: |
  _site/
  _layouts/
  _config.yml
  404.md
  Gemfile
  CNAME
  update-trials.sh
  README.md

theme:
  name: material
  custom_dir: overrides
  logo: assets/img/logo.png
  favicon: assets/img/logo.png
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
  palette:
    # Light mode - yellow/orange tones for the sun
    - scheme: default
      primary: amber
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - scheme: slate
      primary: amber
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/mathieucarbou/YaSolR
    - icon: fontawesome/brands/facebook
      link: https://www.facebook.com/groups/yasolr
  generator: false

extra_css:
  - stylesheets/extra.css

validation:
  links:
    not_found: ignore
    absolute_links: ignore

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - tables

nav:
  - Home: index.md
  - Overview: overview.md
  - Build: build.md
  - Manual: manual.md
  - REST API: rest.md
  - MQTT API: mqtt.md
  - Download: download.md
  - Pro: pro.md
  - Blog: blog/index.md
